services:
  postgres:
    image: postgres:16
    container_name: foodapp-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/DB.sql:/docker-entrypoint-initdb.d/DB.sql

  api:
    build: .
    container_name: foodapp-api
    restart: always
    env_file:
      - .env
    ports:
      - "5000:5000" 
    depends_on:
      - postgres

volumes:
  postgres_data: