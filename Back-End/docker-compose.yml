services:
  postgres:
    image: postgres:16
    container_name: foodapp-postgres
    restart: always
    environment:
      POSTGRES_USER: cihuy
      POSTGRES_PASSWORD: SE0425
      POSTGRES_DB: foodapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: